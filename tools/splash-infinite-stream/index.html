<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: #090412;
      }
      #root {
        position: relative;
        width: 100%;
        height: 100%;
        background: #090412;
        overflow: hidden;
        font-family: "Inter", system-ui, sans-serif;
      }
      .hero-wrap {
        position: absolute;
        left: 50%;
        top: 42%;
        width: 760px;
        height: 760px;
        margin-left: -380px;
        margin-top: -380px;
      }
      .ring {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        border: 4px solid transparent;
        border-top-color: rgba(255, 179, 71, 0.95);
        border-right-color: rgba(232, 121, 249, 0.85);
        border-bottom-color: rgba(139, 92, 246, 0.55);
        border-left-color: rgba(232, 121, 249, 0.35);
        filter: blur(1px);
        opacity: 0;
      }
      .ring-2 {
        inset: 36px;
        border-width: 3px;
        filter: blur(2px);
      }
      .ring-3 {
        inset: 72px;
        border-width: 2px;
        opacity: 0.75;
      }
      .ring-glow {
        position: absolute;
        inset: 80px;
        border-radius: 999px;
        background: radial-gradient(
          circle,
          rgba(232, 121, 249, 0.28) 0%,
          rgba(139, 92, 246, 0.12) 45%,
          rgba(0, 0, 0, 0) 72%
        );
        opacity: 0;
      }
      .play-wrap {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 220px;
        height: 250px;
        margin-left: -110px;
        margin-top: -125px;
        transform: scale(0.88);
        opacity: 0;
      }
      .play-glow {
        position: absolute;
        inset: -48px;
        border-radius: 999px;
        background: radial-gradient(
          circle,
          rgba(255, 179, 71, 0.55) 0%,
          rgba(232, 121, 249, 0.35) 42%,
          rgba(0, 0, 0, 0) 72%
        );
        opacity: 0.75;
      }
      .play-icon {
        position: relative;
        width: 100%;
        height: 100%;
        clip-path: polygon(18% 8%, 88% 50%, 18% 92%);
        border-radius: 38px;
        background: linear-gradient(
          145deg,
          #ffd166 0%,
          #ffb347 24%,
          #e879f9 62%,
          #8b5cf6 100%
        );
        box-shadow:
          0 0 40px rgba(232, 121, 249, 0.45),
          inset 0 0 0 1px rgba(255, 255, 255, 0.18);
      }
      .wave-lines {
        position: absolute;
        inset: 18% 16% 18% 24%;
        overflow: hidden;
        opacity: 0.35;
      }
      .wave-lines span {
        position: absolute;
        left: 0;
        right: 0;
        height: 2px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.35);
      }
      .wave-lines span:nth-child(1) {
        top: 18%;
      }
      .wave-lines span:nth-child(2) {
        top: 36%;
      }
      .wave-lines span:nth-child(3) {
        top: 54%;
      }
      .wave-lines span:nth-child(4) {
        top: 72%;
      }
      .wave-lines span:nth-child(5) {
        top: 90%;
      }
      .title {
        position: absolute;
        left: 50%;
        top: 58%;
        transform: translate(-50%, 80px);
        opacity: 0;
        font-size: 84px;
        font-weight: 700;
        letter-spacing: 18px;
        color: #f3eeff;
        text-shadow:
          0 0 24px rgba(139, 92, 246, 0.55),
          0 0 48px rgba(232, 121, 249, 0.25);
        white-space: nowrap;
      }
      .tagline {
        position: absolute;
        left: 50%;
        top: 64.5%;
        transform: translate(-50%, 48px);
        opacity: 0;
        font-size: 30px;
        font-weight: 500;
        letter-spacing: 1.6px;
        color: #bfa8e8;
        text-shadow: 0 0 16px rgba(139, 92, 246, 0.35);
        white-space: nowrap;
      }
      .particle {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: rgba(232, 121, 249, 0.35);
        filter: blur(1px);
      }
      .bottom-streak {
        position: absolute;
        left: -10%;
        width: 70%;
        height: 3px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(139, 92, 246, 0),
          rgba(232, 121, 249, 0.35),
          rgba(139, 92, 246, 0)
        );
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="3"
      data-width="1080"
      data-height="1920"
    >
      <div id="particles" data-layout-ignore></div>
      <div class="bottom-streak" style="top: 88%" data-layout-ignore></div>
      <div class="bottom-streak" style="top: 92%; left: 8%" data-layout-ignore></div>

      <div class="hero-wrap">
        <div id="ring-glow" class="ring-glow"></div>
        <div id="ring-1" class="ring"></div>
        <div id="ring-2" class="ring ring-2"></div>
        <div id="ring-3" class="ring ring-3"></div>

        <div id="play-wrap" class="play-wrap">
          <div id="play-glow" class="play-glow"></div>
          <div class="play-icon">
            <div id="wave-lines" class="wave-lines">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>
        </div>
      </div>

      <div id="title" class="title">SHORTIGO</div>
      <div id="tagline" class="tagline">SHORT VIDEOS. INFINITE DISCOVERY.</div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};

      const particleRoot = document.getElementById("particles");
      for (let i = 0; i < 18; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.left = `${80 + ((i * 173) % 920)}px`;
        p.style.top = `${120 + ((i * 241) % 1680)}px`;
        particleRoot.appendChild(p);
      }

      const tl = gsap.timeline({ paused: true });

      tl.to("#ring-glow", { opacity: 1, duration: 0.35, ease: "power2.out" }, 0.08);
      tl.to(["#ring-1", "#ring-2", "#ring-3"], { opacity: 1, duration: 0.4, ease: "power2.out" }, 0.12);
      tl.to(
        "#ring-1",
        { rotation: 900, duration: 2.85, ease: "none", transformOrigin: "50% 50%" },
        0.12,
      );
      tl.to(
        "#ring-2",
        { rotation: -720, duration: 2.85, ease: "none", transformOrigin: "50% 50%" },
        0.12,
      );
      tl.to(
        "#ring-3",
        { rotation: 540, duration: 2.85, ease: "none", transformOrigin: "50% 50%" },
        0.12,
      );

      tl.fromTo(
        "#play-wrap",
        { opacity: 0, scale: 0.82 },
        { opacity: 1, scale: 1, duration: 0.45, ease: "back.out(1.5)" },
        0.15,
      );
      tl.to(
        "#play-glow",
        {
          scale: 1.18,
          opacity: 1,
          duration: 0.55,
          ease: "sine.inOut",
          yoyo: true,
          repeat: 4,
          transformOrigin: "50% 50%",
        },
        0.25,
      );
      tl.to(
        "#wave-lines span",
        {
          x: "+=18",
          duration: 0.35,
          ease: "sine.inOut",
          yoyo: true,
          repeat: 7,
          stagger: 0.04,
        },
        0.2,
      );

      tl.fromTo(
        "#title",
        { y: 80, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.55, ease: "back.out(1.8)" },
        0.84,
      );
      tl.fromTo(
        "#tagline",
        { y: 48, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.5, ease: "back.out(1.6)" },
        1.08,
      );

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
